<!-- AI Assistant Chat Widget - Add to public/index.php -->

<div id="ai-assistant-widget" class="ai-widget">
    <div class="ai-widget-header">
        <h3>🤖 Shopping Assistant</h3>
        <button id="ai-widget-close" class="ai-widget-close">✕</button>
    </div>
    
    <div id="ai-chat-messages" class="ai-chat-messages"></div>
    
    <div class="ai-chat-input-area">
        <input 
            type="text" 
            id="ai-query-input" 
            class="ai-query-input"
            placeholder="Ask me anything about products, prices, recipes..."
            autocomplete="off"
        />
        <button id="ai-send-btn" class="ai-send-btn">Send</button>
    </div>

    <div class="ai-quick-actions">
        <button class="ai-quick-btn" data-action="search">🔍 Find Products</button>
        <button class="ai-quick-btn" data-action="recipes">🍳 Recipe Help</button>
        <button class="ai-quick-btn" data-action="budget">💰 Budget Check</button>
        <button class="ai-quick-btn" data-action="allergens">⚠️ Allergens</button>
        <button class="ai-quick-btn" data-action="deals">🎯 Best Deals</button>
    </div>
</div>

<!-- Toggle Button -->
<button id="ai-assistant-toggle" class="ai-assistant-toggle" title="Open Shopping Assistant">
    🤖
</button>

<style>
.ai-assistant-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e31837 0%, #ff6b6b 100%);
    color: white;
    border: none;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(227, 24, 55, 0.4);
    transition: all 0.3s ease;
    z-index: 998;
}

.ai-assistant-toggle:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 16px rgba(227, 24, 55, 0.6);
}

.ai-widget {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 400px;
    max-height: 600px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    display: flex;
    flex-direction: column;
    z-index: 999;
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    transition: all 0.3s ease;
}

.ai-widget.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
}

.ai-widget-header {
    background: linear-gradient(135deg, #e31837 0%, #ff6b6b 100%);
    color: white;
    padding: 16px;
    border-radius: 12px 12px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.ai-widget-header h3 {
    margin: 0;
    font-size: 16px;
}

.ai-widget-close {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.2s;
}

.ai-widget-close:hover {
    background: rgba(255, 255, 255, 0.3);
}

.ai-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    min-height: 200px;
}

.ai-message {
    margin-bottom: 12px;
    animation: slideIn 0.3s ease;
}

.ai-message.user {
    text-align: right;
}

.ai-message.assistant {
    text-align: left;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.ai-message-content {
    display: inline-block;
    padding: 10px 14px;
    border-radius: 8px;
    max-width: 85%;
    word-wrap: break-word;
}

.ai-message.user .ai-message-content {
    background: #e31837;
    color: white;
}

.ai-message.assistant .ai-message-content {
    background: #f0f0f0;
    color: #333;
}

.ai-message.error .ai-message-content {
    background: #ffe0e0;
    color: #cc0000;
}

.ai-chat-input-area {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid #eee;
}

.ai-query-input {
    flex: 1;
    border: 1px solid #ddd;
    padding: 10px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
}

.ai-query-input:focus {
    outline: none;
    border-color: #e31837;
    box-shadow: 0 0 0 3px rgba(227, 24, 55, 0.1);
}

.ai-send-btn {
    background: #e31837;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.2s;
}

.ai-send-btn:hover {
    background: #b81229;
}

.ai-send-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
}

.ai-quick-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid #eee;
    background: #f9f9f9;
    border-radius: 0 0 12px 12px;
}

.ai-quick-btn {
    flex: 1;
    min-width: 80px;
    padding: 8px 10px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}

.ai-quick-btn:hover {
    background: #fff5f5;
    border-color: #e31837;
    color: #e31837;
}

.ai-product-result {
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px;
    margin: 8px 0;
    font-size: 13px;
}

.ai-product-result-title {
    font-weight: 600;
    margin-bottom: 4px;
    color: #333;
}

.ai-product-result-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
}

.ai-product-price {
    font-weight: 600;
    color: #e31837;
}

.ai-product-action {
    background: #e31837;
    color: white;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.ai-product-action:hover {
    background: #b81229;
}

.ai-loading {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #e31837;
    animation: pulse 1.5s ease-in-out infinite;
    margin-right: 4px;
}

@keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
}

@media (max-width: 480px) {
    .ai-widget {
        width: calc(100vw - 40px);
        right: 20px;
        max-height: 80vh;
    }
}
</style>

<script>
class AIAssistant {
    constructor() {
        this.widget = document.getElementById('ai-assistant-widget');
        this.toggle = document.getElementById('ai-assistant-toggle');
        this.closeBtn = document.getElementById('ai-widget-close');
        this.messagesContainer = document.getElementById('ai-chat-messages');
        this.queryInput = document.getElementById('ai-query-input');
        this.sendBtn = document.getElementById('ai-send-btn');
        this.quickBtns = document.querySelectorAll('.ai-quick-btn');
        
        this.init();
    }

    init() {
        this.toggle.addEventListener('click', () => this.toggleWidget());
        this.closeBtn.addEventListener('click', () => this.toggleWidget());
        this.sendBtn.addEventListener('click', () => this.sendQuery());
        this.queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.sendQuery();
        });
        
        this.quickBtns.forEach(btn => {
            btn.addEventListener('click', () => this.handleQuickAction(btn.dataset.action));
        });
    }

    toggleWidget() {
        this.widget.classList.toggle('active');
        if (this.widget.classList.contains('active')) {
            this.queryInput.focus();
        }
    }

    async sendQuery() {
        const query = this.queryInput.value.trim();
        if (!query) return;

        this.addMessage(query, 'user');
        this.queryInput.value = '';
        this.sendBtn.disabled = true;

        try {
            const response = await fetch('/ai-assistant.php?action=ai_query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `query=${encodeURIComponent(query)}&user_id=${userId || 1}`
            });

            const data = await response.json();
            this.displayResponse(data);
        } catch (error) {
            this.addMessage('Sorry, something went wrong. Please try again.', 'error');
        } finally {
            this.sendBtn.disabled = false;
            this.queryInput.focus();
        }
    }

    handleQuickAction(action) {
        const queries = {
            'search': 'Find products for me',
            'recipes': 'Help me find ingredients for a recipe',
            'budget': 'How much is my cart?',
            'allergens': 'Check allergens for me',
            'deals': 'Show me the best deals'
        };
        this.queryInput.value = queries[action] || '';
        this.sendQuery();
    }

    displayResponse(data) {
        if (data.error) {
            this.addMessage(data.message, 'error');
            return;
        }

        // Display main message
        if (data.message) {
            this.addMessage(data.message, 'assistant');
        }

        // Display products if available
        if (data.products && data.products.length > 0) {
            data.products.forEach(product => {
                this.addProductCard(product);
            });
        }

        // Display specific data based on response type
        if (data.type === 'success' && data.advice) {
            this.addMessage(data.advice, 'assistant');
        }

        // Scroll to bottom
        this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
    }

    addMessage(text, sender = 'assistant') {
        const messageEl = document.createElement('div');
        messageEl.className = `ai-message ${sender}`;
        messageEl.innerHTML = `<div class="ai-message-content">${this.escapeHtml(text)}</div>`;
        this.messagesContainer.appendChild(messageEl);
        this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
    }

    addProductCard(product) {
        const cardEl = document.createElement('div');
        cardEl.className = 'ai-product-result';
        cardEl.innerHTML = `
            <div class="ai-product-result-title">${this.escapeHtml(product.description)}</div>
            <div style="color: #666; font-size: 12px;">${this.escapeHtml(product.brand)} • ${this.escapeHtml(product.size || '')}</div>
            <div class="ai-product-result-info">
                <div>
                    <span class="ai-product-price">$${product.price?.toFixed(2) || '0.00'}</span>
                    ${product.discount ? ` <span style="color: #d9534f;">-${product.discount}%</span>` : ''}
                </div>
                <button class="ai-product-action" data-product-id="${product.id}">Add to Cart</button>
            </div>
        `;
        this.messagesContainer.appendChild(cardEl);
        
        // Add click handler for add to cart
        cardEl.querySelector('.ai-product-action').addEventListener('click', () => {
            this.addProductToCart(product.id);
        });
    }

    addProductToCart(productId) {
        // Integrate with existing addToCart function
        if (window.addToCart) {
            window.addToCart(productId);
            this.addMessage('✓ Added to your cart!', 'assistant');
        }
    }

    escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
}

// Initialize when page loads
document.addEventListener('DOMContentLoaded', () => {
    new AIAssistant();
});
</script>
